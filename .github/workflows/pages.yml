name: Deploy demo to GitHub Pages

# Builds the showcase demo and publishes it to GitHub Pages on every push to main.
# Live at: https://devendramilmile121.github.io/datelane/
on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Project page is served under /datelane/, so the app needs that base href.
      - run: npx ng build demo --configuration production --base-href /datelane/
      # SPA fallback: GitHub Pages serves 404.html for unknown paths.
      - run: cp dist/demo/browser/index.html dist/demo/browser/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/demo/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
